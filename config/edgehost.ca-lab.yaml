# Lab Certificate Authority profile — SPA at /ca/, public CRL at /ca/crl.pem
#
#   ./scripts/run-ca.sh
#   # or:
#   export EDGEHOST_LAB_PASSWORD=lab
#   export EDGEHOST_SESSION_HMAC='dev-hmac-key-32-bytes-minimum!!'
#   ./build/edgehost --config config/edgehost.ca-lab.yaml --host 127.0.0.1 --port 18080
#
# Schema (once per database):
#   psql -h /var/run/postgresql -d edgehost -f sql/postgres/002_ca.sql
#
# Overrides via env (rewritten by run-ca.sh into a runtime YAML when needed):
#   CA_PG_SOCK, CA_PG_DATABASE, CA_PG_USER, CA_PG_PASSWORD

listen:
  host: 127.0.0.1
  port: 18080

spa:
  root: ./spa
  max_file_bytes: 262144

packages:
  root: ./packages

http:
  max_body_bytes: 1048576
  max_pending_outbound: 256
  max_upstream_body_bytes: 4194304

state:
  max_keys_default: 1024
  max_value_bytes: 4096
  namespaces:
    net_core:
      enabled: true
    map_dynamic:
      enabled: true
    net_pon:
      enabled: false
    net_home:
      enabled: false
    electric:
      enabled: false
    inventory:
      enabled: false

auth:
  mode: lab_password
  lab_password_env: EDGEHOST_LAB_PASSWORD
  session_hmac_key_env: EDGEHOST_SESSION_HMAC
  session_ttl_s: 28800

dns:
  allow_blocking: true

plugins:
  openai_proxy:
    enabled: false
  slack:
    enabled: false
  teams:
    enabled: false
  pqproxy:
    enabled: false
  clickhouse:
    enabled: false
  ca:
    enabled: true
    pg_sock: /var/run/postgresql/.s.PGSQL.5432
    database: edgehost
    user: edgehost
    # password: ""   # empty = trust/peer on Unix socket
    timeout_ms: 5000
    default_days: 825
  e7_callhome:
    enabled: false
    listen_host: 127.0.0.1
    listen_port: 4334
    transport: raw
    lab_insecure_raw: false

postgres:
  notify_enabled: false
  listen_channel: map_overlay
  ont_status:
    enabled: false
    channel: ont_status
