# Lab E7 Call Home config (foundation PR-1–PR-7; SSH PR-8 when libassh present).
# Raw transport on loopback:4334 — no lab_insecure_raw required.
# Guide: docs/guides/e7-callhome.md · ADR: docs/decisions/018-e7-netconf-callhome.md
# Design: docs/designs/e7-netconf-callhome.md
#
#   export EDGEHOST_LAB_PASSWORD=lab
#   export EDGEHOST_SESSION_HMAC='dev-hmac-key-32-bytes-minimum!!'
#   ./build/edgehost --config config/edgehost.e7-lab.yaml --host 127.0.0.1 --port 18080
#
# Call Home (SSH lab): identity preamble (MAC) → SSH (sysadmin/sysadmin) →
# NETCONF CLIENT hello → OPEN → create-subscription → lab.v1 apply →
# coalesced STATE_CHANGED. Requires EDGEHOST_E7_SSH_AVAILABLE=1 (libassh).
# Identity preamble is still plain TCP before SSH; NMS is SSH server / NETCONF client.
# SPA: http://127.0.0.1:18080/e7/  REST: /api/v1/e7/*
# Security: never use 0.0.0.0 + transport raw without lab_insecure_raw: true.

listen:
  host: 127.0.0.1
  port: 18080

spa:
  root: ./spa
  max_file_bytes: 262144

packages:
  root: ./packages

http:
  max_body_bytes: 1048576
  max_pending_outbound: 256
  max_upstream_body_bytes: 4194304

# Per-ns capacity + compact values (K10 / PR-2a). Tables only when enabled.
state:
  max_keys_default: 1024
  max_value_bytes: 2048
  namespaces:
    net_core:
      enabled: true
    map_dynamic:
      enabled: true
    net_pon:
      enabled: true
      max_keys: 16384
    net_home:
      enabled: false
    electric:
      enabled: false
    inventory:
      enabled: true
      max_keys: 512

auth:
  mode: lab_password
  lab_password_env: EDGEHOST_LAB_PASSWORD
  session_hmac_key_env: EDGEHOST_SESSION_HMAC
  session_ttl_s: 28800

dns:
  allow_blocking: true

plugins:
  openai_proxy:
    enabled: false
  slack:
    enabled: false
  teams:
    enabled: false
  pqproxy:
    enabled: false
  e7_callhome:
    enabled: true
    listen_host: 127.0.0.1
    listen_port: 4334
    # After cleartext identity: NMS is SSH *client* (E7 is SSH server).
    transport: ssh
    ssh_username: sysadmin
    ssh_password: sysadmin
    lab_insecure_raw: false
    reload_policy: merge
    auto_subscribe_unknown: false
    dirty_cap: 8192
    rss_budget_bytes: 268435456
    max_sessions: 160
    # Optional file durability for REST allowlist (PR-10 interim; not Postgres):
    # allowlist_path: ./var/e7_allowlist.txt
    shelves:
      - mac: "00:02:5d:d9:21:47"
        shelf_id: "lab-e7-1"
        enabled: true

postgres:
  notify_enabled: false
  listen_channel: map_overlay
