# Lab E7 Call Home config skeleton (PR-2).
# enabled may be true for future PR-4 listen; PR-2 only parses/validates.
# Raw transport on loopback:4334 — no lab_insecure_raw required.
#
#   export EDGEHOST_LAB_PASSWORD=lab
#   export EDGEHOST_SESSION_HMAC='dev-hmac-key-32-bytes-minimum!!'
#   ./build/edgehost --config config/edgehost.e7-lab.yaml --host 127.0.0.1 --port 18080
#
# NOTE: Call Home TCP listen / libnetconf session pump is NOT implemented yet.

listen:
  host: 127.0.0.1
  port: 18080

spa:
  root: ./spa
  max_file_bytes: 262144

packages:
  root: ./packages

http:
  max_body_bytes: 1048576
  max_pending_outbound: 256
  max_upstream_body_bytes: 4194304

# Per-ns capacity + compact values (K10 / PR-2a). Tables only when enabled.
state:
  max_keys_default: 1024
  max_value_bytes: 2048
  namespaces:
    net_core:
      enabled: true
    map_dynamic:
      enabled: true
    net_pon:
      enabled: true
      max_keys: 16384
    net_home:
      enabled: false
    electric:
      enabled: false
    inventory:
      enabled: true
      max_keys: 512

auth:
  mode: lab_password
  lab_password_env: EDGEHOST_LAB_PASSWORD
  session_hmac_key_env: EDGEHOST_SESSION_HMAC
  session_ttl_s: 28800

dns:
  allow_blocking: true

plugins:
  openai_proxy:
    enabled: false
  slack:
    enabled: false
  teams:
    enabled: false
  pqproxy:
    enabled: false
  e7_callhome:
    enabled: false              # set true once PR-4 listen lands
    listen_host: 127.0.0.1
    listen_port: 4334
    transport: raw
    lab_insecure_raw: false
    reload_policy: merge
    auto_subscribe_unknown: false
    dirty_cap: 8192
    rss_budget_bytes: 268435456
    max_sessions: 160
    shelves:
      - mac: "00:02:5d:d9:21:47"
        shelf_id: "lab-e7-1"
        enabled: true

postgres:
  notify_enabled: false
  listen_channel: map_overlay
