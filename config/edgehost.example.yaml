# Example edgehost configuration (YAML via libyaml).
# Load at start; SIGHUP re-reads this path → shadow validate → apply (ADR-005).
# pqproxy has YAML load at start only — HUP reload is new program behavior.

listen:
  host: 0.0.0.0
  port: 8080

spa:
  root: ./spa
  # optional override; default 65536
  # max_file_bytes: 65536

# Map / package files (libwebmap .wmap, etc.) — URL prefix /packages/
packages:
  root: ./packages

http:
  max_body_bytes: 1048576
  max_pending_outbound: 256
  max_upstream_body_bytes: 4194304

# v1 namespaces (underscore keys — libyaml knowledge paths split on '.')
# Maps to ns names net.core / map.dynamic inside edgecore.
state:
  namespaces:
    net_core:
      enabled: true
    map_dynamic:
      enabled: true

# Auth (P1.7c / ADR-013). Default open for local tests without secrets.
# For lab SPA: mode lab_password and export:
#   EDGEHOST_LAB_PASSWORD=...
#   EDGEHOST_SESSION_HMAC=...
auth:
  mode: open                  # open | lab_password (proxy_headers = P1.7d)
  lab_password_env: EDGEHOST_LAB_PASSWORD
  session_hmac_key_env: EDGEHOST_SESSION_HMAC
  session_ttl_s: 28800

