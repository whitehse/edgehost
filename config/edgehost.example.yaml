# Example edgehost configuration (YAML via libyaml).
# Load at start; SIGHUP re-reads this path → shadow validate → apply (ADR-005).
# pqproxy has YAML load at start only — HUP reload is new program behavior.

listen:
  host: 0.0.0.0
  port: 8080

spa:
  root: ./spa
  # optional override; default 65536
  # max_file_bytes: 65536

# Map / package files (libwebmap .wmap, etc.) — URL prefix /packages/
packages:
  root: ./packages

http:
  max_body_bytes: 1048576
  max_pending_outbound: 256
  max_upstream_body_bytes: 4194304

# State store (underscore keys — libyaml knowledge paths split on '.').
# Maps to dotted ns names inside edgecore (net.core, map.dynamic, …).
# Extra ns stay disabled until a producer is ready (P1.14 / K10).
# Tables allocate only when a namespace is enabled (no RSS for disabled stubs).
state:
  max_keys_default: 1024
  max_value_bytes: 4096
  namespaces:
    net_core:
      enabled: true
      # max_keys: 1024     # optional; 0 / omit → max_keys_default
    map_dynamic:
      enabled: true
    net_pon:
      enabled: false
      # max_keys: 16384    # set when enabling for E7 Call Home (K10)
    net_home:
      enabled: false
    electric:
      enabled: false
    inventory:
      enabled: false
      # max_keys: 512

# Auth (P1.7c–d / ADR-013). Default open for local tests without secrets.
# lab_password: export EDGEHOST_LAB_PASSWORD + EDGEHOST_SESSION_HMAC
# proxy_headers: export EDGEHOST_PROXY_HMAC; proxy signs X-User etc.
auth:
  mode: open                  # open | lab_password | proxy_headers
  lab_password_env: EDGEHOST_LAB_PASSWORD
  session_hmac_key_env: EDGEHOST_SESSION_HMAC
  session_ttl_s: 28800
  proxy_hmac_key_env: EDGEHOST_PROXY_HMAC
  proxy_max_skew_s: 300

dns:
  allow_blocking: false       # true only in lab without upstream_addr

# OpenAI-compatible proxy (P1.8b). Requires OPENAI_API_KEY when enabled.
# TLS server (P1.13). Omit or leave empty for plain TCP lab mode.
# tls:
#   cert: /etc/edgehost/certs/server.crt
#   key: /etc/edgehost/certs/server.key
#   # client_ca: /etc/edgehost/certs/client-ca.crt  # optional mTLS

plugins:
  openai_proxy:
    enabled: false
    upstream: "https://api.openai.com"
    # upstream_addr: "1.2.3.4"   # skip DNS
    # upstream_host: "api.openai.com"
    api_key_env: OPENAI_API_KEY
    service_api_key_env: EDGEHOST_OPENAI_SERVICE_KEY
    timeout_ms: 60000
    rate_limit_rpm: 60
    max_concurrent_per_principal: 4
  slack:
    enabled: false              # P1.9 stub only
  teams:
    enabled: false              # P1.10 stub only
  pqproxy:
    enabled: false              # P1.11 scrape side-car /metrics
    metrics_url: "http://127.0.0.1:9108/metrics"
    scrape_interval_ms: 5000
  # E7 NETCONF Call Home (lab foundation). See docs/guides/e7-callhome.md.
  # Lab profile: config/edgehost.e7-lab.yaml (enabled + sample shelf).
  # transport=raw on non-loopback requires lab_insecure_raw: true.
  # Never ship 0.0.0.0 + raw without that flag and a lab banner.
  e7_callhome:
    enabled: false
    listen_host: 127.0.0.1
    listen_port: 4334
    transport: raw              # raw | ssh (ssh = PR-8 / libassh)
    lab_insecure_raw: false
    reload_policy: merge        # merge | replace_all (K15)
    auto_subscribe_unknown: false
    dirty_cap: 8192
    rss_budget_bytes: 268435456 # 256 MiB
    max_sessions: 160
    shelves: []                 # bootstrap seed — keyed by MAC (K17)
    # - mac: "00:02:5d:d9:21:47"
    #   shelf_id: "west-hut"    # optional label
    #   enabled: true

# Postgres NOTIFY → state (P1.12). Payload schema enforced in edge_notify_apply.
# Full LISTEN connection is host-driven; apply API is available for inject.
postgres:
  notify_enabled: false
  listen_channel: map_overlay

